    type: char(1)
    cast: str
  - pos: 2
    name: unique_key
    type: varchar(19)
    cast: str
  - pos: 3
    name: data_element_code
    type: char(4)
    cast: str
  - pos: 4
    name: data_element_length
    type: integer
    cast: int

lookups: []
derived: []
